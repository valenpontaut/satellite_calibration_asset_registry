# ──────────────────────────────────────────────────────────────
# CI Pipeline — SCAR
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    paths:
      - "admin_api/**"
      - "pipeline_api/**"
      - "shared/**"
      - "tests/**"
      - "examples/**"
      - "Dockerfile*"
      - "docker-compose*.yml"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:

jobs:
  # ── 1. Lint & Format ───────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check admin_api pipeline_api shared tests

      - name: Lint with Ruff
        run: ruff check admin_api pipeline_api shared tests

  # ── 2. SAST ────────────────────────────────────────────────
  sast:
    name: Security Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r admin_api pipeline_api shared -ll

  # ── 3. Tests & Coverage ────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [lint, sast]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=admin_api \
            --cov=pipeline_api \
            --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
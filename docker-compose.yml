services:
  admin-api:
    build:
      context: .
      dockerfile: admin_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://scar:scar@metadata_store:5432/scar
      REDIS_URL: redis://cache:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: scar-assets
    depends_on:
      metadata_store:
        condition: service_healthy
      cache:
        condition: service_healthy
      minio:
        condition: service_healthy
      setup:
        condition: service_completed_successfully

  pipeline-api:
    build:
      context: .
      dockerfile: pipeline_api/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://scar:scar@metadata_store:5432/scar
      REDIS_URL: redis://cache:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: scar-assets
    depends_on:
      metadata_store:
        condition: service_healthy
      cache:
        condition: service_healthy
      minio:
        condition: service_healthy
      setup:
        condition: service_completed_successfully

  metadata_store:
    image: postgres:16
    environment:
      POSTGRES_USER: scar
      POSTGRES_PASSWORD: scar
      POSTGRES_DB: scar
    volumes:
      - metadata_store_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scar"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - object_storage_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5   

  setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo '...waiting for MinIO...';
          sleep 1;
        done;

        mc mb --ignore-existing local/scar-assets;

        echo 'Bucket scar-assets ready.';
        exit 0;
      "

volumes:
  metadata_store_data:
  object_storage_data:
